name: CI/CD

on:
  push:
    branches: [main, develop]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: pytest tests/ -v

  docker-validate:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        flavor: [lite, full]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.flavor }} image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: ${{ matrix.flavor }}
          push: false
          load: false

  publish-pypi:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build and publish
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          pip install build twine
          python -m build
          twine upload dist/*

  publish-docker:
    needs: [test, docker-validate]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        flavor: [lite, full]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Compute Docker tags
        id: tags
        run: |
          image="${{ secrets.DOCKERHUB_USERNAME }}/transcendence-memory-server"
          version="${GITHUB_REF_NAME#v}"
          if [ "${{ matrix.flavor }}" = "lite" ]; then
            echo "tags=${image}:${version}-lite,${image}:lite,${image}:latest" >> "$GITHUB_OUTPUT"
          else
            echo "tags=${image}:${version}-full,${image}:full" >> "$GITHUB_OUTPUT"
          fi
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          target: ${{ matrix.flavor }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
