version: "3.9"

services:
  rag-server:
    build: .
    ports:
      - "${TM_PORT:-8711}:8711"
    volumes:
      - tm-data:/data
    env_file:
      - .env
    environment:
      - WORKSPACE=/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8711/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  tm-data:
